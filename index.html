<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olgunlar Tarım Pro - Çınar Yazılım</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
    <h1>OLGUNLAR TARIM PRO</h1>
    <p>Kasa: <span id="kasa-toplam">0</span> TL</p>
</header>

<main>
    <nav>
        <button class="menu-btn btn-satis" onclick="panelAc('satis-panel')">YENİ SATIŞ</button>
        <button class="menu-btn btn-stok" onclick="panelAc('dashboard')">STOKLAR</button>
        <button class="menu-btn btn-kasa">VERESİYE DEFTERİ</button>
    </nav>

    <div class="content">
        <div id="satis-panel" style="display:none;">
            <div class="card">
                <h3>Hızlı Satış</h3>
                <select id="urun-liste">
                    <option value="900">Üre Gübresi (900 TL)</option>
                    <option value="1300">DAP Gübresi (1300 TL)</option>
                    <option value="500">Sıvı Gübre (500 TL)</option>
                </select>
                <input type="number" id="satis-adet" placeholder="Miktar (Adet)">
                <button class="btn-onay" onclick="satisYap()">SATIŞI TAMAMLA</button>
            </div>
        </div>

        <div id="dashboard">
            <div class="card">
                <h3>Genel Stok Durumu</h3>
                <canvas id="stokGrafik"></canvas>
            </div>
        </div>
    </div>
</main>

<script>
    let kasa = 0;
    let mevcutStok = 100;

    function panelAc(id) {
        document.getElementById('satis-panel').style.display = (id === 'satis-panel' ? 'block' : 'none');
        document.getElementById('dashboard').style.display = (id === 'dashboard' ? 'block' : 'none');
    }

    function satisYap() {
        let fiyat = document.getElementById('urun-liste').value;
        let adet = document.getElementById('satis-adet').value;
        if(adet > 0) {
            kasa += (fiyat * adet);
            mevcutStok -= (adet * 2);
            document.getElementById('kasa-toplam').innerText = kasa;
            myChart.data.datasets[0].data = [mevcutStok, 100 - mevcutStok];
            myChart.update();
            alert("Satış Kaydedildi!");
            panelAc('dashboard');
        }
    }

    const ctx = document.getElementById('stokGrafik').getContext('2d');
    const myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Stokta', 'Satılan'],
            datasets: [{ data: [mevcutStok, 0], backgroundColor: ['#2ecc71', '#eee'] }]
        }
    });
</script>

</body>
</html>
