<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olgunlar Tarım Pro v2 - Çınar Yazılım</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #fff; padding: 15px; border-bottom: 3px solid #27ae60; text-align: center; }
        main { display: flex; flex: 1; }
        
        /* Sol Menü */
        nav { width: 250px; background: #fff; padding: 15px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid #ddd; }
        .menu-btn { padding: 15px; border-radius: 8px; color: white; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-satis { background: #3498db; }
        .btn-stok { background: #2ecc71; }
        .btn-kasa { background: #e74c3c; }

        /* Sağ Alan */
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        
        /* Satış Formu */
        #satis-form { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: none; border-left: 5px solid #3498db; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
        .btn-onay { background: #27ae60; color: white; padding: 10px; width: 100%; border: none; border-radius: 5px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1 style="color:#27ae60">OLGUNLAR TARIM PRO</h1>
    <small>Kasa Durumu: <span id="kasa-toplam">0</span> TL</small>
</header>

<main>
    <nav>
        <button class="menu-btn btn-satis" onclick="panelAc('satis-form')">YENİ SATIŞ</button>
        <button class="menu-btn btn-stok" onclick="panelAc('dashboard')">GENEL DURUM</button>
        <button class="menu-btn btn-kasa">GÜNLÜK RAPOR</button>
    </nav>

    <div class="content">
        <div id="satis-form">
            <h3>Hızlı Satış Paneli</h3>
            <select id="urun">
                <option value="850">Üre Gübresi (850 TL)</option>
                <option value="1200">DAP Gübresi (1200 TL)</option>
                <option value="450">Ot İlacı (450 TL)</option>
            </select>
            <input type="number" id="adet" placeholder="Adet/Çuval Giriniz">
            <button class="btn-onay" onclick="satisYap()">SATIŞI ONAYLA</button>
        </div>

        <div id="dashboard" class="grid">
            <div class="card">
                <h3>Genel Stok</h3>
                <canvas id="stokChart"></canvas>
            </div>
            <div class="card" style="background: #e74c3c; color: white;">
                <h3>Borçlu Listesi</h3>
                <p>Ali Dayı: 15.000 TL</p>
                <p>Mehmet Emmi: 4.200 TL</p>
            </div>
        </div>
    </div>
</main>

<script>
    let kasa = 0;
    let stok = 100;

    function panelAc(id) {
        document.getElementById('satis-form').style.display = (id === 'satis-form') ? 'block' : 'none';
        document.getElementById('dashboard').style.display = (id === 'dashboard') ? 'grid' : 'none';
    }

    function satisYap() {
        const fiyat = document.getElementById('urun').value;
        const adet = document.getElementById('adet').value;
        if(adet > 0) {
            const toplam = fiyat * adet;
            kasa += toplam;
            stok -= (adet * 2); // Temsili stok düşüşü
            document.getElementById('kasa-toplam').innerText = kasa;
            updateChart();
            alert("Satış Başarılı! Toplam: " + toplam + " TL");
            document.getElementById('adet').value = "";
        }
    }

    // Grafik
    const ctx = document.getElementById('stokChart').getContext('2d');
    let myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Dolu', 'Boş'],
            datasets: [{ data: [stok, 100-stok], backgroundColor: ['#2ecc71', '#eee'] }]
        }
    });

    function updateChart() {
        myChart.data.datasets[0].data = [stok, 100-stok];
        myChart.update();
    }
</script>

</body>
</html>
